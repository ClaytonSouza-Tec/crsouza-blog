<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="imagens/icontinho.png" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body data-page="timeline">
    <header class="site-header">
      <div class="container header-top">
        <h1>Clayton Rodrigues Souza</h1>
        <p>Cloud Solutions Architect | DevOps | SRE | Technical Account Manager</p>
      </div>
      <div class="nav-wrapper">
        <div class="container nav-bar">
          <nav>
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre mim</a>
            <a href="tinho.html">Sobre o Tinho</a>
            <a href="eventos.html">Eventos</a>
            <a href="dicas.html">Dicas</a>
            <a href="timeline.html" class="active">Timeline</a>
          </nav>
          <div class="search-box">
            <input type="search" id="globalSearch" placeholder="Buscar no blog" />
          </div>
        </div>
      </div>
    </header>

    <main class="container timeline-layout">
      <section class="timeline-main">
        <h2>Timeline</h2>
        <div class="timeline-container" id="timelineContainer">
          <!-- Notícias carregadas dinamicamente via JavaScript -->
          <div class="timeline-loading">
            <p>Carregando notícias...</p>
          </div>
        </div>
      </section>

      <aside class="timeline-sidebar">
        <section class="sidebar-section recent-updates">
          <h3>Atualizados recentemente</h3>
          <ul id="recentUpdatesList" class="updates-list">
            <!-- Itens carregados dinamicamente -->
            <li class="loading">Carregando...</li>
          </ul>
        </section>

        <section class="sidebar-section tags-cloud">
          <h3>Tags</h3>
          <div id="tagsList" class="tags-list">
            <!-- Tags carregadas dinamicamente -->
            <span class="tag loading">Carregando...</span>
          </div>
        </section>
      </aside>
    </main>

    <!-- Modal para exibir notícia completa -->
    <div id="newsModal" class="news-modal">
      <div class="modal-content">
        <button class="modal-close" aria-label="Fechar">&times;</button>
        <div id="modalBody">
          <!-- Conteúdo da notícia será inserido aqui -->
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-icons">
        <a href="https://www.linkedin.com/in/clayton-rodrigues-souza-5276b875/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://learn.microsoft.com/pt-br/users/claytonrodriguessouza-7987/transcript/vnmmpfr9m6xo0mg" target="_blank" rel="noopener noreferrer" aria-label="Microsoft Learn"><i class="fab fa-microsoft"></i></a>
        <a href="https://www.udemy.com/user/clayton-souza-4/" target="_blank" rel="noopener noreferrer" aria-label="Udemy"><i class="fas fa-graduation-cap"></i></a>
        <a href="https://www.instagram.com/techtinhoofc?utm_source=qr&igsh=ZGpzMTl0cmg1eXRq" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://www.credly.com/users/clayton-souza" target="_blank" rel="noopener noreferrer" aria-label="Credly"><i class="fas fa-certificate"></i></a>
        <a href="https://www.youtube.com/@TechTinhoOFC" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="https://github.com/ClaytonSouza-Tec" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i></a>
      </div>
      <p class="footer-credit">Developed by CRSouza &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
    <script>
      // Carrega notícias da API e popula a timeline
      async function loadTimeline() {
        try {
          const response = await fetch(buildApiUrl("/api/news"));
          if (!response.ok) throw new Error("Erro ao carregar notícias");
          
          const news = await response.json();
          renderTimeline(news);
          renderRecentUpdates(news);
          renderTags(news);
        } catch (error) {
          console.error("Erro na timeline:", error);
          document.querySelector(".timeline-loading").innerHTML = 
            "<p style='color: var(--muted);'>Erro ao carregar notícias</p>";
        }
      }

      function renderTimeline(news) {
        const container = document.getElementById("timelineContainer");
        container.innerHTML = "";

        if (news.length === 0) {
          container.innerHTML = "<p>Nenhuma notícia disponível</p>";
          return;
        }

        news.forEach((item) => {
          const date = new Date(item.date);
          const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", 
                         "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
          const dateStr = `${String(date.getDate()).padStart(2, "0")} ${months[date.getMonth()]}`;

          const article = document.createElement("article");
          article.className = "timeline-item";

          const titleEl = item.url
            ? `<a class="news-link" href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>`
            : `<button class="news-link" data-news-id="${item.id}">${item.title}</button>`;

          const readMoreEl = item.url
            ? `<a class="read-more-btn" href="${item.url}" target="_blank" rel="noopener noreferrer">Ler mais →</a>`
            : `<button class="read-more-btn" data-news-id="${item.id}">Ler mais →</button>`;

          article.innerHTML = `
            <div class="timeline-date">${dateStr}</div>
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <h3>${titleEl}</h3>
              <p class="timeline-meta">${item.source || "Blog"}</p>
              <p class="timeline-excerpt">${item.excerpt || item.content.substring(0, 150)}...</p>
              ${readMoreEl}
            </div>
          `;

          container.appendChild(article);
        });

        // Adiciona listeners apenas nos botões que abrem modal (sem url)
        document.querySelectorAll(".news-link[data-news-id], .read-more-btn[data-news-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const newsId = btn.getAttribute("data-news-id");
            showNewsModal(newsId, news);
          });
        });
      }

      function renderRecentUpdates(news) {
        const list = document.getElementById("recentUpdatesList");
        list.innerHTML = "";

        news.slice(0, 5).forEach((item) => {
          const date = new Date(item.date);
          const dateStr = date.toLocaleDateString("pt-BR");
          
          const li = document.createElement("li");
          if (item.url) {
            li.innerHTML = `
              <a class="recent-link" href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
              <small>${dateStr}</small>
            `;
          } else {
            li.innerHTML = `
              <button class="recent-link" data-news-id="${item.id}">${item.title}</button>
              <small>${dateStr}</small>
            `;
            li.querySelector(".recent-link").addEventListener("click", () => {
              showNewsModal(item.id, news);
            });
          }
          list.appendChild(li);
        });
      }

      function renderTags(news) {
        const tagsContainer = document.getElementById("tagsList");
        tagsContainer.innerHTML = "";

        const tagsSet = new Set();
        news.forEach((item) => {
          if (item.tags) {
            item.tags.split(",").forEach((tag) => {
              tagsSet.add(tag.trim());
            });
          }
        });

        Array.from(tagsSet).sort().forEach((tag) => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = tag;
          span.role = "button";
          span.tabindex = 0;
          span.addEventListener("click", () => {
            // Filtrar por tag quando clicado
            filterByTag(tag, news);
          });
          tagsContainer.appendChild(span);
        });
      }

      function filterByTag(tag, news) {
        const filtered = news.filter((item) => 
          item.tags && item.tags.toLowerCase().includes(tag.toLowerCase())
        );
        renderTimeline(filtered);
      }

      function showNewsModal(newsId, news) {
        const newsItem = news.find((item) => item.id === newsId);
        if (!newsItem) return;

        const modal = document.getElementById("newsModal");
        const modalBody = document.getElementById("modalBody");

        const date = new Date(newsItem.date);
        const dateStr = date.toLocaleDateString("pt-BR");

        modalBody.innerHTML = `
          <article class="news-detail">
            <h2>${newsItem.title}</h2>
            <p class="news-meta">
              <time datetime="${newsItem.date}">${dateStr}</time> · 
              ${newsItem.source || "Blog"}
            </p>
            ${newsItem.image ? `<img src="${newsItem.image}" alt="${newsItem.title}" class="news-image" />` : ""}
            <div class="news-full-content">
              ${newsItem.content}
            </div>
            ${newsItem.tags ? `
              <div class="news-tags">
                ${newsItem.tags.split(",").map((tag) => 
                  `<span class="tag">${tag.trim()}</span>`
                ).join("")}
              </div>
            ` : ""}
          </article>
        `;

        modal.classList.add("active");
        sendAnalyticsEvent({
          eventType: "news_view",
          newsId: newsId,
          newsTitle: newsItem.title
        });
      }

      // Fechar modal
      document.getElementById("newsModal").addEventListener("click", (e) => {
        if (e.target.id === "newsModal" || e.target.classList.contains("modal-close")) {
          document.getElementById("newsModal").classList.remove("active");
        }
      });

      // Carrega timeline ao entrar na página
      document.addEventListener("DOMContentLoaded", loadTimeline);
    </script>
  </body>
</html>
